name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: test-stress-macos-arm64
            binary: stress
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: test-stress-macos-intel
            binary: stress
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: test-stress-linux
            binary: stress
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: test-stress-windows.exe
            binary: stress.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxkbcommon-dev \
          libwayland-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libexpat1-dev \
          libx11-dev \
          libxext-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          libatk1.0-dev

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}

    - name: Rename binary (Unix)
      if: runner.os != 'Windows'
      run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact_name }}

    - name: Rename binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.artifact_name }}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Upload assets to release
      run: gh release upload ${{ github.ref_name }} artifacts/* --repo ${{ github.repository }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
